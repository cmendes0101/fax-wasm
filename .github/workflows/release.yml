name: Release to npm

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Cache third_party sources
        uses: actions/cache@v5
        with:
          path: third_party
          key: fax-wasm-deps-${{ hashFiles('scripts/fetch-deps.sh') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build WASM in Docker
        run: |
          docker build -t fax-wasm-builder .
          docker run --rm \
            -v "$PWD/third_party:/src/third_party" \
            -v "$PWD/build:/src/build" \
            -v "$PWD/dist:/src/dist" \
            -v "$PWD/src/c:/src/src/c" \
            fax-wasm-builder make deps libs wasm
          sudo chown -R "$(id -u):$(id -g)" dist/ build/ third_party/

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Bundle TypeScript
        run: npm run build:bundle

      - name: Run tests
        run: npx vitest run

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
